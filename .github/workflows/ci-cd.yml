name: CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  SOLUTION_FILE: LibraryManagementClean.slnx
  CONFIGURATION: Release

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Find test projects
        id: test-projects
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path . -Recurse -Filter *.csproj |
            Where-Object { $_.Name -match 'Tests?\.csproj$' -or $_.FullName -match '[\\/](tests?|test)[\\/]' }

          if ($projects.Count -gt 0) {
            "has_tests=true" >> $env:GITHUB_OUTPUT
          } else {
            "has_tests=false" >> $env:GITHUB_OUTPUT
            Write-Host "No test projects were found."
          }

      - name: Test
        if: steps.test-projects.outputs.has_tests == 'true'
        run: dotnet test ${{ env.SOLUTION_FILE }} --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

  cd:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Publish API
        run: >
          dotnet publish src/LibraryManagement.Api/LibraryManagement.Api.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --output ./artifacts/api

      - name: Publish Consumers
        run: >
          dotnet publish src/LibraryManagement.Consumers/LibraryManagement.Consumers.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          --output ./artifacts/consumers

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-management-api
          path: ./artifacts/api
          if-no-files-found: error

      - name: Upload Consumers artifact
        uses: actions/upload-artifact@v4
        with:
          name: library-management-consumers
          path: ./artifacts/consumers
          if-no-files-found: error
